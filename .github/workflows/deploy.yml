name: Multi-Deploy (GitHub Pages & PinMe)

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.*'
  
  workflow_dispatch:
    inputs:
      domain:
        description: 'PinMe 自定义域名 (可选)'
        required: false
        type: string
      build_dir:
        description: '打包产物目录'
        required: false
        default: './dist'
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ==========================================
  # JOB 1：独立部署到 GitHub Pages (保持成功)
  # ==========================================
  deploy-github-pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js & Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ github.event.inputs.build_dir || './dist' }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==========================================
  # JOB 2：独立部署到 PinMe (IPFS 侦测与强推)
  # ==========================================
  deploy-to-pinme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js & Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

      - name: Install PinMe CLI
        run: npm install -g pinme

      - name: Deploy to PinMe
        env:
          PINME_APPKEY: ${{ secrets.PINME_APPKEY }}
        run: |
          # 1. 自动解析绑定的子域名
          if [ -n "${{ github.event.inputs.domain }}" ]; then
            DOMAIN="${{ github.event.inputs.domain }}"
          else
            DOMAIN=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          fi
          
          # 2. 【核心诊断】直接去全局 node_modules 里抓取它的源码，看它到底把配置文件写在哪了
          echo "=== 正在全盘侦测 PinMe 配置文件路径 ==="
          PINME_CLI_PATH=$(which pinme)
          echo "PinMe 绝对路径: $PINME_CLI_PATH"
          # 扫描源码中关于文件写入、路径拼接的代码片段，扒出它的真身
          find /usr/local/lib/node_modules/pinme/ -name "*.js" | xargs grep -E "set-appkey|config|fs\.write|path\.join|homedir" || true
          echo "========================================"
          
          # 3. 广撒网保底机制：往当前工作目录写入可能被读取的配置文件
          echo "{\"appKey\":\"$PINME_APPKEY\",\"appkey\":\"$PINME_APPKEY\"}" > ./config.json
          echo "{\"appKey\":\"$PINME_APPKEY\",\"appkey\":\"$PINME_APPKEY\"}" > ./.pinmefile
          echo "PINME_APPKEY=$PINME_APPKEY" > ./.env
          
          # 4. 执行上传
          TARGET_DIR="${{ github.event.inputs.build_dir || './dist' }}"
          echo "正在上传 $TARGET_DIR 到 PinMe 域名: $DOMAIN"
          pinme upload "$TARGET_DIR" --domain "$DOMAIN"
