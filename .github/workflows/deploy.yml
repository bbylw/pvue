name: Multi-Deploy (GitHub Pages & PinMe)

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.*'
  
  workflow_dispatch:
    inputs:
      domain:
        description: 'PinMe 自定义域名 (可选)'
        required: false
        type: string
      build_dir:
        description: '打包产物目录'
        required: false
        default: './dist'
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ==========================================
  # JOB 1：独立部署到 GitHub Pages (保持成功)
  # ==========================================
  deploy-github-pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js & Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ github.event.inputs.build_dir || './dist' }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==========================================
  # JOB 2：独立部署到 PinMe (锁定 /home/runner 精准注入)
  # ==========================================
  deploy-to-pinme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js & Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

      - name: Install PinMe CLI
        run: npm install -g pinme

      - name: Deploy to PinMe
        env:
          PINME_APPKEY: ${{ secrets.PINME_APPKEY }}
        run: |
          # 1. 自动解析绑定的子域名
          if [ -n "${{ github.event.inputs.domain }}" ]; then
            DOMAIN="${{ github.event.inputs.domain }}"
          else
            DOMAIN=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          fi
          
          TARGET_DIR="${{ github.event.inputs.build_dir || './dist' }}"
          echo "正在上传 $TARGET_DIR 到 PinMe 域名: $DOMAIN"
          
          # 2. 【终极注入】既然确定了运行在 /home/runner 环境下，我们无死角伪造配置文件
          # 构造标准的 PinMe 存储 JSON 格式
          JSON_CONF="{\"appKey\":\"$PINME_APPKEY\",\"appkey\":\"$PINME_APPKEY\"}"
          
          # 精准塞入用户家目录、Vite+ 目录以及全局配置目录
          mkdir -p /home/runner/.config/pinme
          mkdir -p /home/runner/.vite-plus/bin
          
          echo "$JSON_CONF" > /home/runner/.config/pinme/config.json
          echo "$JSON_CONF" > /home/runner/.pinmefile
          echo "$JSON_CONF" > /home/runner/.pinme.json
          echo "$JSON_CONF" > /home/runner/.pinmerc
          echo "$JSON_CONF" > /home/runner/.vite-plus/config.json
          echo "$JSON_CONF" > /home/runner/.vite-plus/bin/.pinmefile
          
          # 3. 顺便暴露系统变量做三重保险
          export PINME_APPKEY="$PINME_APPKEY"
          
          # 4. 执行上传
          pinme upload "$TARGET_DIR" --domain "$DOMAIN"
