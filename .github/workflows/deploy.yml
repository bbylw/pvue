name: Multi-Deploy (GitHub Pages & PinMe)

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.*'
  
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ==========================================
  # JOB 1：独立部署到 GitHub Pages（保持稳定成功）
  # ==========================================
  deploy-github-pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js & Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==========================================
  # JOB 2：使用 PinMe 默认机制部署到 IPFS（不自定义域名）
  # ==========================================
  deploy-to-pinme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js & Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

      - name: Install PinMe CLI
        run: npm install -g pinme

      - name: Deploy to PinMe
        env:
          PINME_APPKEY: ${{ secrets.PINME_APPKEY }}
        run: |
          # 1. 尝试使用全局配置文件写入来满足 CLI 的底层读取习惯
          mkdir -p ~/.config/pinme
          echo "{\"appKey\":\"$PINME_APPKEY\",\"appkey\":\"$PINME_APPKEY\"}" > ~/.config/pinme/config.json
          echo "{\"appKey\":\"$PINME_APPKEY\",\"appkey\":\"$PINME_APPKEY\"}" > ~/.pinmefile
          
          # 2. 导出所有可能的环境变量命名格式供 CLI 后台静默抓取
          export PINME_APPKEY="$PINME_APPKEY"
          export APPKEY="$PINME_APPKEY"
          
          # 3. 直接执行默认上传，不带任何 --domain 参数
          # 很多 CLI 在不指定域名时，会自动生成基于哈希或仓库默认名的默认路径，从而绕过高等级的域名所有权强鉴权
          echo "正在以默认模式上传打包产物 ./dist 到 IPFS..."
          pinme upload "./dist"
