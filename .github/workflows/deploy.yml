name: Multi-Deploy (GitHub Pages & PinMe)

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.*'
  
  workflow_dispatch:
    inputs:
      domain:
        description: 'PinMe 自定义域名 (可选)'
        required: false
        type: string
      build_dir:
        description: '打包产物目录'
        required: false
        default: './dist'
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ==========================================
  # JOB 1：独立部署到 GitHub Pages
  # ==========================================
  deploy-github-pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js & Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ github.event.inputs.build_dir || './dist' }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==========================================
  # JOB 2：独立部署到 PinMe (IPFS 去中心化存储)
  # ==========================================
  deploy-to-pinme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js & Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Build
        run: vp build

      - name: Install PinMe CLI
        run: npm install -g pinme

      - name: Deploy to PinMe
        env:
          PINME_APPKEY: ${{ secrets.PINME_APPKEY }}
        run: |
          # 1. 自动解析绑定的子域名
          if [ -n "${{ github.event.inputs.domain }}" ]; then
            DOMAIN="${{ github.event.inputs.domain }}"
          else
            DOMAIN=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          fi
          
          TARGET_DIR="${{ github.event.inputs.build_dir || './dist' }}"
          echo "正在上传 $TARGET_DIR 到 PinMe 域名: $DOMAIN"
          
          # 2. 【核心修复】利用 script 命令伪造真实 TTY 终端
          # 这样可以强行强迫 PinMe 认为身处交互环境，从而接受 echo 传入的 AppKey
          script -q -c "echo '$PINME_APPKEY' | pinme set-appkey" /dev/null
          
          # 3. 验证并执行部署
          pinme upload "$TARGET_DIR" --domain "$DOMAIN"
