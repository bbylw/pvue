<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Rich gradients -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb300" />
      <stop offset="100%" stop-color="#ff6d00" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Solid Black/Dark Hexagonal Base -->
  <polygon points="16,2 29,9.5 29,24.5 16,32 3,24.5 3,9.5" fill="#0d0d0d" stroke="url(#neon-grad)" stroke-width="1.5" />
  <polygon points="16,4 27.27,10.5 27.27,23.5 16,30 4.73,23.5 4.73,10.5" fill="#000000" stroke="#111" stroke-width="1" />

  <!-- Network Connection Grid (Background lines) -->
  <line x1="16" y1="4" x2="16" y2="30" stroke="#ff9100" stroke-width="0.5" stroke-dasharray="1 3" opacity="0.25"/>
  <line x1="4.73" y1="10.5" x2="27.27" y2="23.5" stroke="#ff9100" stroke-width="0.5" stroke-dasharray="1 3" opacity="0.25"/>
  <line x1="4.73" y1="23.5" x2="27.27" y2="10.5" stroke="#ff9100" stroke-width="0.5" stroke-dasharray="1 3" opacity="0.25"/>

  <!-- Stylized "W" & Network Hub Paths -->
  <g filter="url(#neon-glow)">
    <!-- Main W-shape network path -->
    <path d="M 8,12 L 12,22 L 16,14 L 20,22 L 24,12" 
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- Central Hub Accent Node -->
    <circle cx="16" cy="14" r="2.8" fill="url(#neon-grad)" />
    <circle cx="16" cy="14" r="1" fill="#fff" />

    <!-- Left & Right Main Nodes -->
    <circle cx="8" cy="12" r="2" fill="#ffb300" />
    <circle cx="24" cy="12" r="2" fill="#ff6d00" />
    
    <!-- Bottom Pivot Nodes -->
    <circle cx="12" cy="22" r="2" fill="#ff9100" />
    <circle cx="20" cy="22" r="2" fill="#ff9100" />
  </g>
</svg>
